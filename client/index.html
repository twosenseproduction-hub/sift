<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Sift — Turn noise into the next right move</title>
    <meta name="description" content="Pour out the tangle. Get back clarity: themes, intent, and one real next step." />
    <meta property="og:title" content="Sift" />
    <meta property="og:description" content="Pour out the tangle. Get back clarity: themes, intent, and one real next step." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Host-based routing split. Runs before React mounts so the right
      // hash is in place when the router reads it.
      // - app.siftnow.io: serve the app at /. Normalize away /#/landing.
      // - siftnow.io / www.siftnow.io: serve the landing page by default.
      // - any other host (localhost, *.fly.dev, previews): pass through.
      (function () {
        try {
          var h = window.location.hostname;
          var isApp = h === "app.siftnow.io";
          var isMarketing = h === "siftnow.io" || h === "www.siftnow.io";
          if (!isApp && !isMarketing) return;
          var hash = window.location.hash || "";
          if (isApp) {
            if (hash === "" || hash === "#" || hash === "#/" || hash === "#/landing") {
              window.location.replace("/#/");
            }
          } else if (isMarketing) {
            if (hash === "" || hash === "#" || hash === "#/") {
              window.location.replace("/#/landing");
            }
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
